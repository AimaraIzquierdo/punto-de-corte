<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">

  <!-- Shield shape -->
  <path d="M340 40 L400 65 L400 140 Q400 185 340 210 Q280 185 280 140 L280 65 Z"
